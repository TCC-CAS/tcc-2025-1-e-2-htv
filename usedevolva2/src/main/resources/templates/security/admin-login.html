<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo | Use&Devolva</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<main class="register-page login-page">
  <section class="register-card login-card" aria-labelledby="loginTitle">
    <div class="accessibility-tools" aria-label="Ferramentas de acessibilidade">
      <button type="button" id="contrastBtn">Alto contraste</button>
      <button type="button" id="fontBtn">Aumentar fonte</button>
      <button type="button" id="audioBtn">Ouvir tela</button>
    </div>
    <div class="register-header login-header">
      <h1 id="loginTitle">Painel do Administrador</h1>
      <p>Acesse com suas credenciais para gerenciar denúncias e usuários.</p>
    </div>

    <form class="login-form" novalidate>

      <div class="form-group">
        <label for="loginEmail">E-mail de Administrador</label>
        <input type="email" id="loginEmail" name="email" placeholder="admin@usedevolva.com" autocomplete="email"
               aria-describedby="emailHelp" required>
        <small id="emailHelp" class="sr-only">Digite seu e-mail administrativo.</small>
      </div>

      <div class="form-group">
        <label for="loginSenha">Senha</label>
        <input type="password" id="loginSenha" name="senha" placeholder="Digite sua senha"
               autocomplete="current-password" aria-describedby="senhaHelp" required>
        <small id="senhaHelp" class="sr-only">Digite sua senha administrativa.</small>
      </div>

      <div class="login-options" style="min-height: 20px;"></div>

      <p class="form-message" role="alert" aria-live="assertive"></p>

      <button type="submit" class="submit-btn">Entrar no Painel</button>

    </form>

  </section>
</main>

<script src="/js/main.js" defer></script>
<script src="/js/pages/auth/admin-login.js" defer></script>
</body>

</html>
