<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagamento confirmado - Use e Devolva</title>

    <link rel="stylesheet" href="/css/root.css">
    <link rel="stylesheet" href="/css/fragments/header.css">
    <link rel="stylesheet" href="/css/fragments/footer.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f8fafc;
        }

        .payment-success-container {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .payment-success-card {
            background: #fff;
            max-width: 560px;
            width: 100%;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
            text-align: center;
        }

        .payment-success-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #dcfce7;
            color: #16a34a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            margin: 0 auto 1.5rem;
        }

        .payment-success-card h1 {
            color: #111827;
            margin-bottom: 0.75rem;
        }

        .payment-success-card p {
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .payment-status {
            background: #f1f5f9;
            border-radius: 14px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: #334155;
            font-weight: 500;
        }

        .payment-success-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .payment-success-actions a,
        .payment-success-actions button {
            border: none;
            border-radius: 12px;
            padding: 0.85rem 1.2rem;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }

        .primary-btn {
            background: var(--primary);
            color: #fff;
        }

        .secondary-btn {
            background: #e5e7eb;
            color: #111827;
        }
    </style>
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<main class="payment-success-container">
    <section class="payment-success-card">
        <div class="payment-success-icon">✓</div>

        <h1>Pagamento confirmado!</h1>

        <p>
            Recebemos a confirmação do pagamento. Aguarde alguns segundos enquanto atualizamos seu plano no sistema.
        </p>

        <div class="payment-status" id="paymentStatusMessage">
            Verificando pagamento em 30 segundos...
        </div>

        <div class="payment-success-actions">
            <button type="button" class="primary-btn" onclick="syncPaymentNow()">
                Verificar agora
            </button>

            <a href="/users/profile" class="secondary-btn">
                Voltar ao perfil
            </a>
        </div>
    </section>
</main>

<script src="/js/core/main.js" defer></script>
<script src="/js/pages/payments/payment-success.js" defer></script>

</body>
</html>
