<!-- PÁGINA DE BUSCA -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscar Ferramentas - Use e Devolva</title>

    <link rel="stylesheet" href="/css/fragments/header.css">
    <link rel="stylesheet" href="/css/fragments/footer.css">
    <link rel="stylesheet" href="/css/pages/tools.css">
    <link rel="stylesheet" href="/css/root.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="search-container">

    <header class="search-header">
        <h1>Buscar ferramentas</h1>
        <p id="searchSummary">Carregando ferramentas disponíveis...</p>
    </header>

    <aside class="search-filters">
        <div class="filter-group">
            <h3>Refinar busca</h3>
        </div>

        <div class="filter-group">
            <label for="categoria">Categoria</label>
            <select id="categoria">
                <option value="">Todas as categorias</option>
                <option value="construcao">Construção</option>
                <option value="jardinagem">Jardinagem</option>
                <option value="eletrica">Elétrica</option>
                <option value="limpeza">Limpeza</option>
                <option value="marcenaria">Marcenaria</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="estadoConservacao">Estado de conservação</label>
            <select id="estadoConservacao">
                <option value="">Todos</option>
                <option value="Novo">Novo</option>
                <option value="Ótimo estado">Ótimo estado</option>
                <option value="Bom estado">Bom estado</option>
                <option value="Usado com marcas de uso">Usado com marcas de uso</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="valorMinimo">Preço mínimo (dia)</label>
            <input type="number" id="valorMinimo" placeholder="R$ 0,00" min="0">
        </div>

        <div class="filter-group">
            <label for="valorMaximo">Preço máximo (dia)</label>
            <input type="number" id="valorMaximo" placeholder="R$ 100,00" min="0">
        </div>

        <div class="filter-actions">
            <button id="applyFiltersBtn" type="button">Aplicar filtros</button>
            <button id="clearFiltersBtn" type="button">Limpar</button>
        </div>

        <button class="btn-map" type="button">
            📍 Ver no Mapa
        </button>
    </aside>

    <main class="results-grid" id="resultsGrid">
        <div class="loading-message">Carregando ferramentas...</div>
    </main>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="/js/tools-list.js"></script>

</body>
</html>
