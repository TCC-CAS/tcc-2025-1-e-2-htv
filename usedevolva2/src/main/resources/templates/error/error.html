<!DOCTYPE html>
<html lang="pt-PT" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ops! Ocorreu um Erro - Use e Devolva</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/root.css">

    <style>
        .error-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 65vh;
            padding: 2rem;
            background-color: #f8fafc;
            font-family: 'Poppins', sans-serif;
        }

        .error-card {
            background: white;
            padding: 3rem 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 550px;
            width: 100%;
            border: 1px solid #e2e8f0;
        }

        .error-code {
            font-size: 5rem;
            font-weight: 700;
            color: var(--cor-primaria-escura, #1e3a8a);
            line-height: 1;
            margin-bottom: 1rem;
            letter-spacing: -2px;
        }

        .error-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1e2937;
            margin-bottom: 1rem;
        }

        .error-message {
            color: var(--cor-texto-medio, #64748b);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .error-actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .btn-home {
            padding: 0.75rem 1.8rem;
            background-color: var(--cor-primaria-escura, #1e3a8a);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.2);
        }

        .btn-home:hover {
            opacity: 0.9;
        }

        .btn-home:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="error-wrapper">
    <div class="error-card">
        <div class="error-code" th:text="${status}">404</div>

        <h1 class="error-title" th:text="${errorTitle}">Página Não Encontrada</h1>

        <p class="error-message" th:text="${errorMsg}">A página que você tentou acessar não existe ou foi movida temporariamente.</p>

        <div class="error-actions">
            <a href="/home" class="btn-home">Voltar para o Início</a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
