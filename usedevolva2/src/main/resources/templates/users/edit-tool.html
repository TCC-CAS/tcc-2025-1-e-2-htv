
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastrar Ferramenta - Use e Devolva</title>

<!--        <link rel="stylesheet" href="../../static/css/fragments/header.css">-->
<!--<link rel="stylesheet" href="../../static/css/fragments/footer.css">-->
<!--<link rel="stylesheet" href="../../static/css/root.css">-->

    <link rel="stylesheet" href="/css/fragments/header.css">
    <link rel="stylesheet" href="/css/fragments/footer.css">
    <link rel="stylesheet" href="/css/root.css">
    <link rel="stylesheet" href="/css/pages/users/edit-tool.css">



    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>


<main>
        <div class="page-header">
            <h2>Editar Ferramenta</h2>
            <p>Atualize as informações da sua ferramenta para a manter atrativa para os locatários.</p>
        </div>

    <form class="edit-form" id="editToolForm" novalidate>

        <p class="form-message" role="alert" aria-live="assertive"></p>

   
        <section class="form-section">
            <h3>Informações Básicas</h3>

            <div class="form-group">
                <label for="nomeFerramenta">Nome da ferramenta</label>
                <input type="text" id="nomeFerramenta" name="nomeFerramenta" required />
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="categoria">Categoria</label>
                    <select id="categoria" name="categoria" required>
                        <option value="">Selecione uma categoria</option>
                        <option value="construcao">Construção</option>
                        <option value="jardinagem">Jardinagem</option>
                        <option value="eletrica">Elétrica</option>
                        <option value="limpeza">Limpeza</option>
                        <option value="marcenaria">Marcenaria</option>
                        <option value="outros">Outros</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="valorDiaria">Valor da diária (R$)</label>
                    <input type="number" id="valorDiaria" name="valorDiaria" step="0.50" min="1" required />
                </div>
            </div>

            <div class="form-group">
                <label for="estadoConservacao">Estado de conservação</label>
                <select id="estadoConservacao" name="estadoConservacao" required>
                    <option value="">Selecione o estado</option>
                    <option value="Novo">Novo</option>
                    <option value="Ótimo estado">Ótimo estado</option>
                    <option value="Bom estado">Bom estado</option>
                    <option value="Usado com marcas de uso">Usado com marcas de uso</option>
                </select>
            </div>

            <div class="form-group">
                <label for="descricao">Descrição detalhada</label>
                <textarea id="descricao" name="descricao" required></textarea>
            </div>
        </section>


        <section class="form-section">
            <h3>Fotos</h3>

            <div class="photo-gallery" id="currentImagesContainer"></div>

            <div class="file-upload-wrapper">
                <input type="file" id="fotos" name="fotos" multiple accept="image/*" />
                <label for="fotos">Adicionar novas fotos</label>
                <p>Você pode adicionar novas imagens à ferramenta (máx. 10)</p>
            </div>

            <div id="newImagesPreviewContainer" class="image-preview-container"></div>
        </section>


        <div class="form-actions">
            <button type="button" class="btn btn-outline" onclick="window.location.href='/users/my-tools'">
                Cancelar
            </button>

            <button type="submit" class="btn btn-primary">
                Salvar Alterações
            </button>
        </div>

    </form>
    </main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
