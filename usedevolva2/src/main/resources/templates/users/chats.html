<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Meus chats - Use e Devolva</title>
    <link rel="stylesheet" href="/css/fragments/header.css">
    <link rel="stylesheet" href="/css/fragments/footer.css">
    <link rel="stylesheet" th:href="@{/css/root.css}">
    <link rel="stylesheet" th:href="@{/css/pages/users/chats.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="chats-page">
    <section class="chats-card">
        <aside class="chats-sidebar">
            <div class="chats-sidebar-header">
                <h1>Meus chats</h1>
                <p>Converse sobre ferramentas e locações.</p>
            </div>

            <div id="chatsList" class="chats-list">
                <p class="chats-loading">Carregando conversas...</p>
            </div>
        </aside>

        <section class="chat-content">
            <div id="chatEmptyState" class="chat-empty-state">
                <div class="chat-empty-icon">💬</div>
                <h2>Selecione uma conversa</h2>
                <p>Escolha um chat para visualizar e enviar mensagens.</p>
            </div>

            <div id="chatConversation" class="chat-conversation hidden">
                <header class="chat-conversation-header">
                    <div>
                        <h2 id="chatTitle">Chat</h2>
                        <p id="chatSubtitle"></p>
                    </div>
                </header>

                <div id="chatMessages" class="chat-messages"></div>

                <form id="chatMessageForm" class="chat-message-form">
                    <textarea
                            id="chatMessageInput"
                            placeholder="Digite sua mensagem..."
                            rows="2"
                            maxlength="3000"
                            required
                    ></textarea>

                    <button type="submit" class="btn btn-primary">
                        Enviar
                    </button>
                </form>
            </div>
        </section>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/main.js}" defer></script>
<script th:src="@{/js/chats.js}" defer></script>
</body>
</html>
