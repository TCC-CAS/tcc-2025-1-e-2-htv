<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acompanhamento de Aluguel - Use e Devolva</title>

    <link rel="stylesheet" href="/css/fragments/header.css">
    <link rel="stylesheet" href="/css/fragments/footer.css">
    <link rel="stylesheet" href="/css/pages/rental-tracking.css">
    <link rel="stylesheet" href="/css/root.css">

<!--<link rel="stylesheet" href="../../static/css/fragments/header.css">-->
<!--<link rel="stylesheet" href="../../static/css/fragments/footer.css">-->
<!--<link rel="stylesheet" href="../../static/css/pages/rental-tracking.css">-->
<!--<link rel="stylesheet" href="../../static/css/root.css">-->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

    <main>

        <section class="caminho-container">
            <h2 style="margin-top:0; margin-bottom: 30px; font-size: 1.2rem;">Status Atual</h2>
            
            <div class="caminho-wrapper">
                <div class="caminho-linha-fundo"></div>
                <div class="caminho-linha-progresso" id="linhaProgresso"></div>

                <div class="etapa" data-passo="0">
                    <div class="etapa-bolinha">
                        <span class="etapa-numero">1</span>
                        <svg class="etapa-icone" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <div class="etapa-texto">Solicitação<br>Enviada</div>
                </div>

                <div class="etapa" data-passo="1">
                    <div class="etapa-bolinha">
                        <span class="etapa-numero">2</span>
                        <svg class="etapa-icone" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <div class="etapa-texto">Aprovada<br>pelo Dono</div>
                </div>

                <div class="etapa" data-passo="2">
                    <div class="etapa-bolinha">
                        <span class="etapa-numero">3</span>
                        <svg class="etapa-icone" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <div class="etapa-texto">Pagamento<br>Confirmado</div>
                </div>

                <div class="etapa" data-passo="3">
                    <div class="etapa-bolinha">
                        <span class="etapa-numero">4</span>
                        <svg class="etapa-icone" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <div class="etapa-texto">Item retirado</div>
                </div>

                <div class="etapa" data-passo="4">
                    <div class="etapa-bolinha">
                        <span class="etapa-numero">5</span>
                        <svg class="etapa-icone" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <div class="etapa-texto">Em uso</div>
                </div>

                <div class="etapa" data-passo="4">
                    <div class="etapa-bolinha">
                        <span class="etapa-numero">6</span>
                        <svg class="etapa-icone" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <div class="etapa-texto">Devolvido</div>
                </div>
            </div>

            <button class="btn-simular" id="btnAvancar"></button>
        </section>

        <div class="grid-infos">
            <section class="card">

                <h2>Resumo do aluguel</h2>

                <p>
                    <strong>Ferramenta:</strong>
                    <span id="toolName">-</span>
                </p>

                <p>
                    <strong>Proprietário:</strong>
                    <span id="ownerName">-</span>
                </p>

                <p>
                    <strong>Período:</strong>
                    <span id="rentalPeriod">-</span>
                </p>

                <p>
                    <strong>Status:</strong>

                    <span
                            id="statusTexto"
                            style="font-weight:bold;"
                    >
            -
        </span>
                </p>

            </section>

            <section class="card">

                <h2>Pagamento</h2>

                <p>
                    <strong>Método:</strong>
                    <span id="paymentMethod">Pix</span>
                </p>

                <p>
                    <strong>Valor pago:</strong>

                    <span
                            class="destaque-valor"
                            id="paymentValue"
                    >
            R$ 0,00
        </span>
                </p>

            </section>

            <section class="card">

                <h2>Entrega / Retirada</h2>

                <p>
                    <strong>Forma:</strong>

                    <span id="deliveryType">
            Retirada presencial
        </span>
                </p>

            </section>
        </div>

    </main>

<script src="/js/rental-tracking.js" defer></script>


<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
