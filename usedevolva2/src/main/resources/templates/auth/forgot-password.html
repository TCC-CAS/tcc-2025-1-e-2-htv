<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar senha | Use&Devolva</title>

  <link rel="stylesheet" href="../../static/css/root.css">
  <link rel="stylesheet" href="../../static/css/auth/auth.css">
</head>

<body>

  <div class="page-wrapper">
    <div class="auth-card" aria-labelledby="recoveryTitle">

      <span class="icon-header" aria-hidden="true">📩</span>

      <h1 id="recoveryTitle">Recuperar senha</h1>

      <p class="instruction-text">
        Enviaremos um link de recuperação para o e-mail cadastrado na sua conta.
      </p>

      <div class="accessibility-tools" aria-label="Ferramentas de acessibilidade">
        <button type="button" id="contrastBtn">Alto contraste</button>
        <button type="button" id="fontBtn">Aumentar fonte</button>
        <button type="button" id="audioBtn">Ouvir tela</button>
      </div>

      <form class="auth-form" action="/auth/request-recovery" method="POST" novalidate>
        <div class="input-group">
          <label for="email">E-mail</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="exemplo@email.com" 
            autocomplete="email"
            aria-describedby="emailHelp"
            required
          >
          <small id="emailHelp" class="sr-only">
            Digite o e-mail cadastrado na sua conta para receber o link de recuperação de senha.
          </small>
        </div>

        <p class="form-message" role="alert" aria-live="assertive"></p>

        <button type="submit" class="btn-submit">
          Enviar link de acesso
        </button>
      </form>

      <div class="card-footer">
        <a href="/auth/login" class="back-link" aria-label="Voltar para a tela de login">
          ← Voltar para o login
        </a>
      </div>

    </div>
  </div>

  <script src="../../static/js/main.js" defer></script>
</body>
</html>
