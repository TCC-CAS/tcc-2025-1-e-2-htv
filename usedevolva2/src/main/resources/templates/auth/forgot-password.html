<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar senha | Use&Devolva</title>

  <link rel="stylesheet" th:href="@{/css/root.css(v=${#dates.createNow().time})}">
  <link rel="stylesheet" th:href="@{/css/style.css(v=${#dates.createNow().time})}">
  <link rel="stylesheet" th:href="@{/css/auth/auth.css(v=${#dates.createNow().time})}">
</head>

<body>

<div class="recovery-container">
  <div class="recovery-card" aria-labelledby="recoveryTitle">

    <div class="card-header">
      <span class="main-icon" aria-hidden="true">📩</span>

      <section class="accessibility-bar" aria-label="Ferramentas de acessibilidade">
        <button type="button" class="access-btn" id="contrastBtn" title="Alto contraste" aria-label="Ativar alto contraste">
          <span aria-hidden="true">◐</span>
        </button>
        <button type="button" class="access-btn" id="fontBtn" title="Aumentar fonte" aria-label="Aumentar fonte">
          <span aria-hidden="true">A+</span>
        </button>
        <button type="button" class="access-btn" id="audioBtn" title="Ouvir página" aria-label="Ouvir página">
          <span aria-hidden="true">▶</span>
        </button>
      </section>
    </div>

    <h1 class="card-title" id="recoveryTitle">Recuperar senha</h1>

    <p class="card-description">
      Enviaremos um link de recuperação para o e-mail cadastrado na sua conta.
    </p>

    <form class="custom-form" action="/auth/request-recovery" method="POST" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">E-mail</label>
        <input
                type="email"
                id="email"
                class="form-input"
                name="email"
                placeholder="exemplo@email.com"
                autocomplete="email"
                aria-describedby="emailHelp"
                required
        >
        <small id="emailHelp" class="screen-reader-only">
          Digite o e-mail cadastrado na sua conta para receber o link de recuperação de senha.
        </small>
      </div>

      <p class="alert-message" role="alert" aria-live="assertive"></p>

      <button type="submit" class="btn-primary">
        Enviar link de acesso
      </button>
    </form>

    <div class="card-navigation">
      <a href="/auth/login" class="link-back" aria-label="Voltar para a tela de login">
        ← Voltar para o login
      </a>
    </div>

  </div>
</div>

<script src="/js/core/main.js" defer></script>
<script src="/js/pages/auth/login.js" defer></script>
</body>
</html>
