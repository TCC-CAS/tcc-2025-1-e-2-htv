<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta | Use&Devolva</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- <link rel="stylesheet" href="../../static/css/style.css"> -->

</head>

<body class="create-body-root">

<main class="register-page">
  <section class="register-card" aria-labelledby="registerTitle">

    <div class="register-header">
      <h1 id="registerTitle">Criar conta</h1>
      <p>Cadastre-se para alugar ou disponibilizar ferramentas com segurança.</p>
    </div>

    <br>
      <button type="button" id="contrastBtn" class="create-btn-tool">Alto contraste</button>
      <button type="button" id="fontBtn" class="create-btn-tool">Aumentar fonte</button>
      <button type="button" id="audioBtn" class="create-btn-tool">Ouvir tela</button>
    <br>
    <br>

    <form class="register-form" id="registerForm" novalidate>

      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input 
          type="text" 
          id="nome" 
          name="nome"
          placeholder="Digite seu nome completo"
          autocomplete="name"
          required
        >
        <small class="create-sr-only">Digite seu nome sem abreviações.</small>
      </div>

      <div class="form-group">
        <label for="cpf">CPF</label>
        <input 
          type="text" 
          id="cpf" 
          name="cpf"
          placeholder="000.000.000-00"
          required
        >
        <small class="create-sr-only">Informe apenas os números do seu CPF.</small>
      </div>

      <div class="form-group">
        <label for="telefone">Telefone</label>
        <input 
          type="tel" 
          id="telefone" 
          name="telefone"
          placeholder="(00) 00000-0000"
          autocomplete="tel"
          required
        >
      </div>

      <div class="form-group">
        <label for="dataNascimento">Data de nascimento</label>
        <input 
          type="date" 
          id="dataNascimento" 
          name="dataNascimento"
          required
        >
      </div>

      <div class="form-group">
        <label for="email">Endereço de e-mail</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          placeholder="seuemail@email.com"
          autocomplete="email"
          required
        >
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input 
          type="password" 
          id="senha" 
          name="senha"
          placeholder="Crie uma senha"
          autocomplete="new-password"
          required
        >
      </div>

      <div class="form-group">
        <label for="confirmarSenha">Confirmar senha</label>
        <input 
          type="password" 
          id="confirmarSenha" 
          name="confirmarSenha"
          placeholder="Confirme sua senha"
          autocomplete="new-password"
          required
        >
      </div>

      <div class="terms">
        <label>
          <input type="checkbox" id="aceitouTermosUso" name="aceitouTermosUso" required>
          <span>Aceito os Termos de Uso e a Política de Privacidade.</span>
        </label>

        <label>
          <input type="checkbox" id="aceitouPoliticaPrivacidade" name="aceitouPoliticaPrivacidade" required>
          <span>Declaro que li e aceito a Política de Privacidade.</span>
        </label>
      </div>

      <p class="form-message create-status-msg"></p>

      <button type="submit" class="submit-btn create-main-action">
        Criar conta
      </button>

      <p class="login-text">
        Já possui conta?
        <a href="/auth/login">Entrar agora</a>
      </p>
    </form>
  </section>
</main>

<script src="../../static/js/api.js" defer></script>
<script src="../../static/js/register.js" defer></script> -->

<script src="/js/main.js" defer></script>
<script src="/js/api.js" defer></script>
<script src="/js/register.js" defer></script>

</body>
</html>
