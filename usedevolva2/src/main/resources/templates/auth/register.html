<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | Use&Devolva</title>

    <link rel="stylesheet" href="../static/css/style.css">
</head>

<body>

<main class="register-page">
    <section class="register-card">
        <div class="logo-area">
            <img src="assets/images/logo-use-devolva.png" alt="Use&Devolva">
        </div>
        <div class="register-header">
            <h1>Criar conta</h1>
            <p>Cadastre-se para alugar ou disponibilizar ferramentas com segurança.</p>
        </div>
        <form class="register-form">
            <div class="form-group">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" placeholder="Digite seu nome completo">
            </div>
            <div class="form-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00">
            </div>
            <div class="form-group">
                <label for="email">Endereço de e-mail</label>
                <input type="email" id="email" placeholder="seuemail@email.com">
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Crie uma senha">
            </div>
            <div class="form-group">
                <label for="confirmarSenha">Confirmar senha</label>
                <input type="password" id="confirmarSenha" placeholder="Confirme sua senha">
            </div>
            <div class="terms">
                <label>
                    <input type="checkbox">
                    <span>
                            Aceito os Termos de Uso e a Política de Privacidade.
                        </span>
                </label>

                <label>
                    <input type="checkbox">
                    <span>
                            Declaro que tenho 16 anos ou mais.
                        </span>
                </label>
            </div>


            <button type="submit" class="submit-btn">
                Criar conta
            </button>
            <p class="login-text">
                Já possui conta?
                <a href="login.html">Entrar agora</a>
            </p>

        </form>

    </section>

</main>

<script src="js/main.js" defer></script>

</body>

</html>
