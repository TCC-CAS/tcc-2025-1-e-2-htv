<!--TELA DE LOGIN-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<link rel="stylesheet" href="../../static/css/root.css">
<link rel="stylesheet" href="../../static/css/auth/auth.css">


<body>

<div class="login-container">
        <a href="/" class="logo">Use e Devolva</a>
        
        <h1>Bem-vindo de volta!</h1>
        <p class="subtitle">Acesse sua conta para alugar ou anunciar ferramentas.</p>

        <form action="/auth/login-endpoint" method="POST">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="E-mail" required />
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Senha" required />
            </div>

            <button type="submit">Entrar</button>
        </form>
        <div class="form-footer">
            <a href="/auth/forgot-password">Esqueci minha senha</a>
            <p style="color: var(--cor-texto-medio); font-weight: 400;">
                Não tem uma conta? <a href="/auth/register">Criar conta</a>
            </p>
        </div>

    </div>

</body>
</html>
