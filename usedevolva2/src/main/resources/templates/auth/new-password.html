<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definir Nova Senha | Use&Devolva</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<main class="register-page login-page">
    <section class="register-card login-card" aria-labelledby="passwordTitle">

        <div class="accessibility-tools" aria-label="Ferramentas de acessibilidade">
            <button type="button" id="contrastBtn">Alto contraste</button>
            <button type="button" id="fontBtn">Aumentar fonte</button>
            <button type="button" id="audioBtn">Ouvir tela</button>
        </div>

        <div class="register-header login-header">
            <h1 id="passwordTitle">Definir nova senha</h1>
            <p>Escolha uma senha forte para proteger sua conta no Use&Devolva.</p>
        </div>

        <form class="login-form" id="resetPasswordForm" novalidate>

            <input type="hidden" id="token" th:value="${token}">

            <div class="form-group">
                <label for="newPassword">Nova senha</label>
                <input type="password" id="newPassword" name="newPassword" placeholder="Digite sua nova senha"
                       autocomplete="new-password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar nova senha</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirme sua nova senha"
                       autocomplete="new-password" required>
            </div>

            <p class="form-message" role="alert" aria-live="assertive"></p>

            <button type="submit" class="submit-btn">Atualizar senha</button>

        </form>
    </section>
</main>

<script src="/js/core/main.js" defer></script>
<script>
    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const token = document.getElementById('token').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const messageEl = document.querySelector('.form-message');

        if (newPassword !== confirmPassword) {
            messageEl.textContent = "As senhas não coincidem.";
            messageEl.style.color = "red";
            return;
        }

        try {
            const response = await fetch('/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });

            if (response.ok) {
                messageEl.style.color = "green";
                messageEl.textContent = "Senha alterada com sucesso! Redirecionando...";
                setTimeout(() => window.location.href = '/auth/login', 2000);
            } else {
                messageEl.textContent = "Erro ao alterar a senha. Tente novamente.";
                messageEl.style.color = "red";
            }
        } catch (err) {
            messageEl.textContent = "Erro de conexão com o servidor.";
        }
    });
</script>
</body>
</html>
