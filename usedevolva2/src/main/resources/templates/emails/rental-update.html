<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { width: 90%; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .header { background-color: #007bff; color: white; padding: 10px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { padding: 20px; }
        .button { display: inline-block; padding: 10px 20px; background-color: #28a745; color: white; text-decoration: none; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>Atualização no seu Aluguel</h2>
    </div>
    <div class="content">
        <p>Olá, <strong th:text="${userName}">Usuário</strong>!</p>
        <p>Informamos que houve uma atualização no status da sua locação (ID: <span th:text="${rentalId}"></span>).</p>

        <p>O novo status é: <b><span th:text="${status}"></span></b>.</p>

        <p>Você pode conferir todos os detalhes da sua locação clicando no botão abaixo:</p>

        <a th:href="${link}" class="button">Ver detalhes da locação</a>
    </div>
    <hr>
    <p style="font-size: 0.8em; color: #777;">Equipe Devolva.use - Conectando ferramentas e pessoas.</p>
</div>
</body>
</html>
