<!-- Mesma tela da criação de ferramenta, porem os campos virão preenchidos-->


<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastrar Ferramenta - Use e Devolva</title>
</head>
<body>

<div>
    Header
</div>

<main>

    <section>
        <h1>Editar ferramenta</h1>
        <p>Preencha as informações abaixo para disponibilizar sua ferramenta na plataforma.</p>
    </section>

    <section>
        <form>

            <div>
                <label for="nomeFerramenta">Nome da ferramenta</label>
                <input type="text" id="nomeFerramenta" name="nomeFerramenta" placeholder="Ex: Furadeira" />
            </div>

            <div>
                <label for="descricao">Descrição detalhada</label>
                <textarea id="descricao" name="descricao" rows="5" cols="50" placeholder="Descreva a ferramenta, sua potência, uso indicado, acessórios inclusos, etc."></textarea>
            </div>

            <div>
                <label for="categoria">Categoria</label>
                <select id="categoria" name="categoria">
                    <option value="">Selecione uma categoria</option>
                    <option value="construcao">Construção</option>
                    <option value="jardinagem">Jardinagem</option>
                    <option value="eletrica">Elétrica</option>
                    <option value="limpeza">Limpeza</option>
                    <option value="marcenaria">Marcenaria</option>
                </select>
            </div>

            <div>
                <label for="estadoConservacao">Estado de conservação</label>
                <select id="estadoConservacao" name="estadoConservacao">
                    <option value="">Selecione o estado</option>
                    <option value="novo">Novo</option>
                    <option value="otimo">Ótimo estado</option>
                    <option value="bom">Bom estado</option>
                    <option value="regular">Regular</option>
                </select>
            </div>

            <div>
                <label for="valorDiaria">Valor do aluguel por diária</label>
                <input type="number" id="valorDiaria" name="valorDiaria" placeholder="0,00" step="0.01" />
            </div>

            <div>
                <label for="fotos">Fotos da ferramenta</label>
                <input type="file" id="fotos" name="fotos" multiple />
                <p>Envie uma ou mais fotos da ferramenta.</p>
            </div>

            <div>
                <label for="localizacao">Localização aproximada</label>
                <input type="text" id="localizacao" name="localizacao" placeholder="Ex: Interlagos - São Paulo/SP" />
            </div>

            <div>
                <h2>Disponibilidade</h2>
                <p>Defina quando a ferramenta poderá ser alugada.</p>
            </div>

            <div>
                <label for="dataInicioDisponibilidade">Data inicial</label>
                <input type="date" id="dataInicioDisponibilidade" name="dataInicioDisponibilidade" />
            </div>

            <div>
                <label for="dataFimDisponibilidade">Data final</label>
                <input type="date" id="dataFimDisponibilidade" name="dataFimDisponibilidade" />
            </div>

            <div>
                <label for="observacoes">Observações</label>
                <textarea id="observacoes" name="observacoes" rows="4" cols="50" placeholder="Inclua nesse campo quaisquers observações necessárias."></textarea>
            </div>

            <div>
                <button type="submit">Cadastrar ferramenta</button>
                <button type="reset">Limpar campos</button>
            </div>

        </form>
    </section>

</main>

<div>
    Footer
</div>

</body>
</html>
