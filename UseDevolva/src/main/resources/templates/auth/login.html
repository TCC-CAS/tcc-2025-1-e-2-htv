<!--TELA DE LOGIN-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h1>Entrar</h1>
<p>Acesse sua conta para alugar ou anunciar ferramentas.</p>

<form>
    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" />

    <label for="senha">Senha</label>
    <input type="password" id="senha" name="senha" />

    <button type="submit">Entrar</button>
</form>

<p><a href="/auth/forgot-password">Esqueci minha senha</a></p>
<p><a href="/auth/register">Criar conta</a></p>

</body>
</html>
