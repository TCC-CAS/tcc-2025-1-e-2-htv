<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>


<h1>Criar conta</h1>
<p>Preencha seus dados para criar sua conta na plataforma.</p>

<form>

    <label for="nomeCompleto">Nome completo</label>
    <input type="text" id="nomeCompleto" name="nomeCompleto" />

    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" />

    <label for="telefone">Telefone</label>
    <input type="text" id="telefone" name="telefone" />

    <label for="cpf">CPF</label>
    <input type="text" id="cpf" name="cpf" />

    <label for="senha">Senha</label>
    <input type="password" id="senha" name="senha" />

    <label for="confirmarSenha">Confirmar senha</label>
    <input type="password" id="confirmarSenha" name="confirmarSenha" />

    <label for="endereco">Endereço</label>
    <input type="text" id="endereco" name="endereco" />

    <div>
        <input type="checkbox" id="aceiteTermos" name="aceiteTermos" />
        <label for="aceiteTermos">
            Li e aceito os Termos de Uso
        </label>
    </div>

    <div>
        <input type="checkbox" id="aceitePolitica" name="aceitePolitica" />
        <label for="aceitePolitica">
            Li e aceito a Política de Privacidade
        </label>
    </div>

    <button type="submit">Criar conta</button>

</form>

<p><a href="/auth/login">Já tenho conta</a></p>

</body>
</html>
