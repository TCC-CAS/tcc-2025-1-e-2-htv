<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Use&Devolva</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <main class="register-page">

    <section class="register-card" aria-labelledby="loginTitle">

      <div class="register-header">
        <h1 id="loginTitle">Entrar</h1>
        <p>
          Acesse sua conta para alugar ou disponibilizar ferramentas.
        </p>
      </div>

      <div class="accessibility-tools" aria-label="Ferramentas de acessibilidade">
        <button type="button" id="contrastBtn" aria-label="Ativar ou desativar alto contraste">
          Alto contraste
        </button>

        <button type="button" id="fontBtn" aria-label="Aumentar ou reduzir fonte">
          Aumentar fonte
        </button>

        <button type="button" id="audioBtn" aria-label="Ouvir descrição da tela">
          Ouvir tela
        </button>
      </div>

      <form class="login-form" novalidate>

        <div class="form-group">
          <label for="loginEmail">Endereço de e-mail</label>
          <input 
            type="email" 
            id="loginEmail" 
            name="email"
            placeholder="seuemail@email.com"
            autocomplete="email"
            aria-describedby="emailHelp"
            required
          >
          <small id="emailHelp" class="sr-only">
            Digite um e-mail válido, como nome@email.com.
          </small>
        </div>

        <div class="form-group">
          <label for="loginSenha">Senha</label>
          <input 
            type="password" 
            id="loginSenha" 
            name="senha"
            placeholder="Digite sua senha"
            autocomplete="current-password"
            aria-describedby="senhaHelp"
            required
          >
          <small id="senhaHelp" class="sr-only">
            Digite sua senha cadastrada.
          </small>
        </div>

        <div class="login-options">
          <label>
            <input type="checkbox" name="lembrar">
            <span>Lembrar de mim</span>
          </label>

          <a href="#" aria-label="Recuperar senha esquecida">Esqueci minha senha</a>
        </div>

        <p class="form-message" role="alert" aria-live="assertive"></p>

        <button type="submit" class="submit-btn">
          Entrar
        </button>

        <p class="login-text">
          Ainda não possui conta?
          <a href="cadastro.html">Criar conta</a>
        </p>

      </form>

    </section>

  </main>

  <script src="js/main.js" defer></script>

</body>
</html>
