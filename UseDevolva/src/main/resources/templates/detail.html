<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhe da Ferramenta | Use&Devolva</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <main class="page detail-page">
    <header class="header detail-header">
      <a href="index.html" class="header__logo">
        <img src="assets/images/logo-use-devolva.png" alt="Use&Devolva">
      </a>

      <form class="search" id="searchForm">
        <input type="text" id="searchInput" placeholder="Buscar ferramentas...">
        <button type="submit">⌕</button>
      </form>

      <nav class="auth">
        <a href="login.html" class="auth__link auth__link--login">Login</a>
        <a href="criar-conta.html" class="auth__link auth__link--register">Cadastro</a>
      </nav>
    </header> 
    <section class="detail-wrapper">
      <div class="detail-top">

        <div class="detail-image">
          <img src="assets/images/tool-placeholder.svg" alt="Chave de fenda metal">
        </div>
        <aside class="detail-info">

          <h1>CHAVE DE FENDA METAL</h1>

          <p class="detail-subtitle">Avaliação dos locadores</p>

          <div class="detail-rating">☻ ☻ ☻ ☻ ☻</div>

          <strong class="detail-price">R$ 800,00</strong>

          <a href="#" class="detail-rent-button">
            Solicitar aluguel
          </a>

          <div class="detail-location-card">

            <p>ver raio de localização</p>

            <div class="detail-cep-small">
              <input type="text" placeholder="CEP">
              <button>Checar</button>
            </div>

            <strong>Detalhes da locação</strong>

            <p>
              Combine retirada, prazo e regras diretamente com o locador.
            </p>

          </div>

        </aside>

      </div>
      <nav class="detail-tabs">
        <button>DESCRIÇÃO</button>
        <button class="active">LOCALIZAÇÃO</button>
        <button>REGRAS</button>
      </nav>

      <section class="detail-location-content">

        <p class="withdraw">
          <strong>Retirada em:</strong> Santo Amaro &nbsp;&nbsp; SP
        </p>

        <p class="available">● Disponível hoje</p>
        <p class="distance">● 3km de você</p>

        <div class="detail-cep-large">
          <input type="text" placeholder="Digite seu CEP para calcular a distância">
          <button>Checar</button>
        </div>

        <div class="detail-map">
          <div class="map-pin">📍</div>
          <p>Santo Amaro - SP</p>
        </div>

      </section>

    </section>

  </main>

  <script src="js/main.js" defer></script>

</body>
</html>
